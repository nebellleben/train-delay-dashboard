name: Deploy to Streamlit Cloud

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install streamlit
      
      - name: Deploy to Streamlit Cloud
        uses: streamlit/streamlit-app-action@v0.0.3
        with:
          app-name: train-delay-dashboard
        env:
          STREAMLIT_SHARING_BASE_URL: ${{ secrets.STREAMLIT_SHARING_BASE_URL }}
          STREAMLIT_SHARING_API_KEY: ${{ secrets.STREAMLIT_SHARING_API_KEY }}
